_inherit_default: false

data:
  include_primary_train_dataset: false
  rgb_input: true
  image_size: 256
  batch_size: 16
  val_batch_size: 16
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  target_degree: 5
  min_curve_length: 3.0
  max_targets: 512
  train_augment: true
  endpoint_target_mode: points
  endpoint_dedupe_distance_px: 2.0
  endpoint_closed_curve_threshold_px: 2.0
  augment:
    resize_scale_range: [1.0, 1.5]
    affine_scale_range: [0.9, 1.1]
    affine_max_rotate_deg: 10.0
    affine_max_translate_ratio: 0.06
    hflip_prob: 0.5
    vflip_prob: 0.0
  limit_samples: null
  sample_names: null
  extra_train_datasets:
    - dataset_type: laion_synthetic
      data_root: /home/user/yc47434/laion/edge_detection
      image_root: /home/user/yc47434/laion/edge_detection/edge_detection
      bezier_root: /home/user/yc47434/laion/edge_detection/laion_edge_v3_bezier
      batch_glob: batch*
      entry_cache_path: /home/user/yc47434/laion/edge_detection/laion_entry_cache_v3_bezier.txt
      selection_seed: 20260318
      selection_offset: 2048
  val_dataset:
    dataset_type: laion_synthetic
    data_root: /home/user/yc47434/laion/edge_detection
    image_root: /home/user/yc47434/laion/edge_detection/edge_detection
    bezier_root: /home/user/yc47434/laion/edge_detection/laion_edge_v3_bezier
    batch_glob: batch*
    entry_cache_path: /home/user/yc47434/laion/edge_detection/laion_entry_cache_v3_bezier.txt
    selection_seed: 20260318
    selection_offset: 0
    max_samples: 1024
  test_dataset:
    dataset_type: laion_synthetic
    data_root: /home/user/yc47434/laion/edge_detection
    image_root: /home/user/yc47434/laion/edge_detection/edge_detection
    bezier_root: /home/user/yc47434/laion/edge_detection/laion_edge_v3_bezier
    batch_glob: batch*
    entry_cache_path: /home/user/yc47434/laion/edge_detection/laion_entry_cache_v3_bezier.txt
    selection_seed: 20260318
    selection_offset: 1024
    max_samples: 1024

model:
  arch: dab_curve_detr
  input_channels: 3
  target_degree: 5
  hidden_dim: 256
  num_queries: 300
  nheads: 8
  num_encoder_layers: 6
  num_decoder_layers: 6
  dim_feedforward: 2048
  dropout: 0.0
  dab_backbone_name: resnet50
  dab_backbone_pretrained: true
  dab_backbone_dilation: false
  backbone_input_norm: imagenet
  dab_keep_query_pos: false
  dab_query_scale_type: cond_elewise
  dab_curve_embed_diff_each_layer: false
  dab_query_modulation_mode: sine_proj
  conditioned_curve_init_enabled: true
  conditioned_curve_init_checkpoint: null
  curve_coord_min: -0.1
  curve_coord_max: 1.1
  object_bias: -2.0
  no_object_bias: 2.0
loss:
  class_loss_type: focal
  focal_alpha: 0.5
  focal_gamma: 1.0
  curve_distance_type: chamfer
  curve_cost: null
  curve_weight: null
  chamfer_cost: 5.0
  ce_weight: 1.0
  chamfer_weight: 5.0
  chamfer_num_samples: 20
  chamfer_match_point_count: 20
  emd_cost: 5.0
  emd_weight: 5.0
  emd_num_samples: 20
  emd_match_point_count: 20
  emd_sinkhorn_epsilon: 0.02
  emd_sinkhorn_iters: 10
  emd_length_weight: 1.0
  emd_transport_presence_power: 0.5
  emd_chunk_size: null
  closed_curve_endpoint_dist_threshold: 0.03
  edge_prob_cost: 0.5
  no_object_weight: 0.2
  dynamic_class_balance: false
  endpoint_loss_type: l1
  point_attach_matching_enabled: false
  point_attach_matching_cost: 1.0
  point_attach_weight: 1.0
  point_attach_low_degree_multiplier: 1.0
  point_attach_degree_threshold: 3
  point_attach_num_curve_samples: 8

optimizer:
  lr: 0.00002
  backbone_lr: 0.00001
  weight_decay: 0.0001
  beta1: 0.9
  beta2: 0.999
  scheduler: none
  warmup_epochs: 0
  warmup_start_factor: 0.1
  lr_milestones: [140, 180]
  lr_gamma: 0.1
  min_lr_ratio: 0.01

trainer:
  default_root_dir: /home/user/yc47434/cluster_runs/parametric_edge_prediction/laion-dab-r50-4gpu-q300-eb64-lr2e5-fp32
  max_epochs: 1000
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_true
  precision: 32-true
  accumulate_grad_batches: 1
  log_every_n_steps: 10
  gradient_clip_val: 0.1
  deterministic: false
  benchmark: true
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
  effective_train_batches_per_epoch: 2000
  run_test_after_fit: false

callbacks:
  visualization_every_n_epochs: 1
  visualization_every_n_train_steps: 2000
  visualization_score_threshold: 0.5
  visualization_max_curves: 300

logging:
  csv: true
  wandb:
    enabled: true
    offline: false
    project: laion_parametric_edge_prediction
    name: laion-dab-r50-4gpu-q300-eb64-lr2e5-fp32
    group: laion-dab-pretrain
    job_type: train
    tags:
      - laion
      - cluster
      - 4gpu
      - dab
      - r50
      - q300
      - effective-batch-64
      - lr2e-5
      - fp32
    save_dir: /home/user/yc47434/cluster_runs/parametric_edge_prediction/laion-dab-r50-4gpu-q300-eb64-lr2e5-fp32/wandb
