data:
  train_edge_globs:
    - edge_data/HED-BSDS/gt_rgb/train/*.png
    - edge_data/HED-BSDS/gt_rgb/val/*.png
  val_edge_glob: edge_data/HED-BSDS/gt_rgb/test/*.png
  test_edge_glob: edge_data/HED-BSDS/gt_rgb/test/*.png
  train_input_roots:
    - edge_data/HED-BSDS/images/train
    - edge_data/HED-BSDS/images/val
  val_input_root: edge_data/HED-BSDS/images/test
  test_input_root: edge_data/HED-BSDS/images/test
  rgb_input: true
  image_size: 256
  batch_size: 10
  val_batch_size: 10
  num_workers: 10
  pin_memory: true
  persistent_workers: true
  cache_dir: edge_data/HED-BSDS/cache/graph_polyline_v1_segments_xy_v5_anchor_consistent
  target_version: v5_anchor_consistent
  target_degree: 5
  min_curve_length: 3.0
  max_targets: 512
  train_augment: true
  augment:
    resize_scale_range: [1.0, 1.5]
    affine_scale_range: [0.9, 1.1]
    affine_max_rotate_deg: 10.0
    affine_max_translate_ratio: 0.06
    hflip_prob: 0.5
    vflip_prob: 0.0
  limit_samples: null
  overfit_num_samples: null
  sample_names: null

model:
  input_channels: 3
  target_degree: 5
  hidden_dim: 384
  num_queries: 512
  nheads: 12
  num_encoder_layers: 4
  num_decoder_layers: 6
  dim_feedforward: 1536
  dropout: 0.0
  num_feature_levels: 4
  num_sampling_points: 8
  deformable_offset_scale: 2.0
  backbone_name: vit_small_patch14_dinov2
  backbone_pretrained: true
  backbone_out_indices: [2, 5, 8, 11]
  backbone_input_norm: imagenet
  query_source: two_stage
  curve_parameterization: endpoint_offsets
  curve_delta_scale: 0.35
  curve_extent_min: 0.2
  curve_extent_max: 1.8
  interior_delta_ratio: 0.35
  object_bias: -2.0
  no_object_bias: 2.0
  dn_num_groups: 4
  dn_noise_scale: 0.04

loss:
  class_loss_type: focal
  focal_alpha: 0.25
  focal_gamma: 2.0
  control_cost: 1.5
  sample_cost: 2.0
  box_cost: 0.5
  giou_cost: 1.0
  curve_distance_cost: 6.0
  curve_match_point_count: 4
  num_curve_samples: 24
  ce_weight: 1.0
  ctrl_weight: 5.0
  sample_weight: 4.0
  endpoint_weight: 2.0
  bbox_weight: 2.0
  giou_weight: 1.0
  curve_distance_weight: 2.0
  curve_distance_length_weight: 0.25
  extent_weight: 1.0
  no_object_weight: 0.05
  aux_weight: 0.5
  dn_weight: 1.0
  dn_curve_weight: 5.0
  group_detr_num_groups: 4
  one_to_many_weight: 0.3
  one_to_many_ce_weight: 1.0
  one_to_many_ctrl_weight: 3.0
  one_to_many_sample_weight: 3.0
  one_to_many_endpoint_weight: 2.0
  one_to_many_bbox_weight: 2.0
  one_to_many_extent_weight: 1.0
  topk_positive_enabled: true
  topk_positive_per_gt: 2
  topk_positive_layer_k: [2, 2, 2, 2, 2]
  topk_positive_weight: 0.2
  topk_positive_tau: 1.5
  distinct_weight: 0.1
  distinct_topk: 32
  distinct_spatial_sigma: 0.12
  group_detr_active_group_policy: max
  group_detr_min_active_groups: 2
  count_weight: 0.0

optimizer:
  lr: 0.0001
  backbone_lr: 0.00001
  weight_decay: 0.0001
  beta1: 0.9
  beta2: 0.999
  scheduler: multistep
  warmup_epochs: 20
  warmup_start_factor: 0.1
  lr_milestones: [350, 425]
  lr_gamma: 0.1
  min_lr_ratio: 0.01

trainer:
  default_root_dir: outputs/parametric_edge_training/formal_bsds_train_val_test
  max_epochs: 500
  accelerator: gpu
  devices: 2
  strategy: ddp_find_unused_parameters_true
  precision: 16-mixed
  accumulate_grad_batches: 2
  channels_last: true
  log_every_n_steps: 10
  gradient_clip_val: 0.1
  deterministic: false
  benchmark: true
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  overfit_batches: 0.0
  num_sanity_val_steps: 2
  check_val_every_n_epoch: 1
  run_test_after_fit: false

callbacks:
  visualization_every_n_epochs: 20
  visualization_score_threshold: 0.3
  visualization_max_curves: 128

logging:
  csv: true
  wandb:
    enabled: true
    offline: false
    project: parametric-edge-prediction
    name: formal-bsds-train-val-test
    group: formal-bsds
    job_type: train
    tags:
      - formal
      - bsds
      - two-gpu
      - dinov2
      - grouped
      - all-features
    save_dir: outputs/parametric_edge_training/formal_bsds_train_val_test/wandb