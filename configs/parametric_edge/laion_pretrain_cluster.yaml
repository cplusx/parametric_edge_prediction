      data_root: /home/user/yc47434/laion/edge_detection
      image_root: /home/user/yc47434/laion/edge_detection/edge_detection
      edge_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2
      cache_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2_bezier_cache_fast
      batch_glob: batch*
      quantize: 4
      selection_seed: 20260318
      selection_offset: 2048
  val_dataset:
    dataset_type: laion_synthetic
    data_root: /home/user/yc47434/laion/edge_detection
    image_root: /home/user/yc47434/laion/edge_detection/edge_detection
    edge_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2
    cache_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2_bezier_cache_fast
    batch_glob: batch*
    quantize: 4
    selection_seed: 20260318
    selection_offset: 0
    max_samples: 1024
  test_dataset:
    dataset_type: laion_synthetic
    data_root: /home/user/yc47434/laion/edge_detection
    image_root: /home/user/yc47434/laion/edge_detection/edge_detection
    edge_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2
    cache_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2_bezier_cache_fast
    batch_glob: batch*
    quantize: 4
    selection_seed: 20260318
    selection_offset: 1024
    max_samples: 1024

model:
  input_channels: 3
  target_degree: 5
  hidden_dim: 320
  num_queries: 256
  nheads: 10
  num_encoder_layers: 4
  num_decoder_layers: 6
  dim_feedforward: 1280
  dropout: 0.0
  num_feature_levels: 4
  num_sampling_points: 8
  deformable_offset_scale: 2.0
  backbone_name: vit_small_patch14_dinov2
  backbone_pretrained: true
  backbone_out_indices: [2, 5, 8, 11]
  backbone_input_norm: imagenet
  query_source: two_stage
  group_proposal_pool_factor: 1.0
  group_proposal_split_strategy: random_aux_chunk
  curve_parameterization: endpoint_offsets
  curve_delta_scale: 0.35
  interior_delta_ratio: 0.35
  object_bias: -2.0
  no_object_bias: 2.0
  dn_num_groups: 4
  dn_noise_scale: 0.04

loss:
  class_loss_type: focal
  focal_alpha: 0.25
  focal_gamma: 2.0
  control_cost: 1.5
  sample_cost: 2.0
  giou_cost: 1.0
  curve_distance_cost: 6.0
  curve_match_point_count: 4
  num_curve_samples: 24
  ce_weight: 5.5
  ctrl_weight: 9.0
  sample_weight: 6.0
  endpoint_weight: 9.0
  giou_weight: 0.15
  curve_distance_weight: 7.5
  curve_distance_length_weight: 0.25
  no_object_weight: 1.0
  dynamic_class_balance: true
  aux_weight: 0.2
  aux_layer_stride: 2
  dn_weight: 3.0
  dn_curve_weight: 5.0
  group_detr_num_groups: 3
  one_to_many_weight: 0.25
  one_to_many_ce_weight: 1.5
  one_to_many_ctrl_weight: 9.0
  one_to_many_sample_weight: 6.0
  one_to_many_endpoint_weight: 9.0
  one_to_many_giou_weight: 0.15
  one_to_many_curve_distance_weight: 7.5
  topk_positive_enabled: true
  topk_positive_per_gt: 2
  topk_positive_layer_k: [2, 2, 2, 2, 2]
  topk_positive_weight: 0.0
  topk_positive_tau: 1.5
  distinct_weight: 4.0
  distinct_topk: 32
  distinct_spatial_sigma: 0.12

optimizer:
  lr: 0.00005
  backbone_lr: 0.000025
  weight_decay: 0.0001
  beta1: 0.9
  beta2: 0.999
  scheduler: multistep
  warmup_epochs: 20
  warmup_start_factor: 0.1
  lr_milestones: [140, 180]
  lr_gamma: 0.1
  min_lr_ratio: 0.01

trainer:
  default_root_dir: /home/user/yc47434/cluster_runs/parametric_edge_prediction/laion-pretrain-4gpu-q256-eb256-lr5e5-fp32-om025-topk0-resume
  max_epochs: 200
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_true
  precision: 32-true
  accumulate_grad_batches: 4
  log_every_n_steps: 10
  gradient_clip_val: 0.1
  deterministic: false
  benchmark: true
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  overfit_batches: 0.0
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
  effective_train_batches_per_epoch: 2000
  run_test_after_fit: false

callbacks:
  visualization_every_n_epochs: 1
  visualization_every_n_train_steps: 2000
  visualization_score_threshold: 0.3
  visualization_max_curves: 128

logging:
