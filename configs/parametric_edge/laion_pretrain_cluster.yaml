_inherit_default: false

data:
  include_primary_train_dataset: false
  rgb_input: true
  image_size: 256
  batch_size: 16
  val_batch_size: 16
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  target_degree: 5
  min_curve_length: 3.0
  max_targets: 512
  train_augment: true
  augment:
    resize_scale_range: [1.0, 1.5]
    affine_scale_range: [0.9, 1.1]
    affine_max_rotate_deg: 10.0
    affine_max_translate_ratio: 0.06
    hflip_prob: 0.5
    vflip_prob: 0.0
  limit_samples: null
  overfit_num_samples: null
  sample_names: null
  extra_train_datasets:
