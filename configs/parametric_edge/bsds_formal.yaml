_inherit_default: false

data:
  train_edge_globs:
    - edge_data/HED-BSDS/gt_rgb/train/*.png
    - edge_data/HED-BSDS/gt_rgb/val/*.png
  val_edge_glob: edge_data/HED-BSDS/gt_rgb/test/*.png
  test_edge_glob: edge_data/HED-BSDS/gt_rgb/test/*.png
  train_input_roots:
    - edge_data/HED-BSDS/images/train
    - edge_data/HED-BSDS/images/val
  val_input_root: edge_data/HED-BSDS/images/test
  test_input_root: edge_data/HED-BSDS/images/test
  include_primary_train_dataset: true
  rgb_input: true
  image_size: 256
  batch_size: 10
  val_batch_size: 10
  num_workers: 10
  pin_memory: true
  persistent_workers: true
  cache_dir: edge_data/HED-BSDS/cache/graph_polyline_v1_segments_xy_v5_anchor_consistent
  target_version: v5_anchor_consistent
  target_degree: 5
  min_curve_length: 3.0
  max_targets: 512
  train_augment: true
  augment:
    resize_scale_range: [1.0, 1.5]
    affine_scale_range: [0.9, 1.1]
    affine_max_rotate_deg: 10.0
    affine_max_translate_ratio: 0.06
    hflip_prob: 0.5
    vflip_prob: 0.0
  limit_samples: null
  sample_names: null

model:
  arch: dab_curve_detr
  input_channels: 3
  target_degree: 5
  hidden_dim: 256
  num_queries: 300
  nheads: 8
  num_encoder_layers: 6
  num_decoder_layers: 6
  dim_feedforward: 2048
  dropout: 0.0
  dab_backbone_name: resnet50
  dab_backbone_pretrained: true
  dab_backbone_dilation: false
  backbone_input_norm: imagenet
  dab_keep_query_pos: false
  dab_query_scale_type: cond_elewise
  dab_curve_embed_diff_each_layer: false
  dab_query_modulation_mode: sine_proj
  curve_coord_min: -0.1
  curve_coord_max: 1.1
  object_bias: -2.0
  no_object_bias: 2.0
loss:
  class_loss_type: focal
  control_cost: 5.0
  endpoint_cost: 5.0
  ce_weight: 1.0
  ctrl_weight: 5.0
  endpoint_weight: 5.0
  no_object_weight: 0.2
  dynamic_class_balance: false

optimizer:
  lr: 0.00002
  backbone_lr: 0.00001
  weight_decay: 0.0001
  beta1: 0.9
  beta2: 0.999
  scheduler: multistep
  warmup_epochs: 10
  warmup_start_factor: 0.1
  lr_milestones: [350, 425]
  lr_gamma: 0.1
  min_lr_ratio: 0.01

trainer:
  default_root_dir: outputs/parametric_edge_training/bsds_dab_r50_formal
  max_epochs: 500
  accelerator: gpu
  devices: 2
  strategy: ddp_find_unused_parameters_true
  precision: 32-true
  accumulate_grad_batches: 2
  channels_last: true
  log_every_n_steps: 10
  gradient_clip_val: 0.1
  deterministic: false
  benchmark: true
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  num_sanity_val_steps: 2
  check_val_every_n_epoch: 1
  run_test_after_fit: false

callbacks:
  visualization_every_n_epochs: 20
  visualization_every_n_train_steps: 500
  visualization_score_threshold: 0.5
  visualization_max_curves: 300

logging:
  csv: true
  wandb:
    enabled: true
    offline: false
    project: parametric-edge-prediction
    name: bsds-dab-r50-formal-500ep
    group: bsds-dab-formal
    job_type: train
    tags:
      - bsds
      - dab
      - r50
      - formal
      - 500ep
    save_dir: outputs/parametric_edge_training/bsds_dab_r50_formal/wandb
