data:
  batch_size: 10
  val_batch_size: 10
  image_size: 192
  limit_samples: null
  overfit_num_samples: 10
  sample_names:
    - 141048_ann1.png
    - 108069_ann2.png
    - 106005_ann3.png
    - 159002_ann3.png
    - 100007_ann1.png
    - 15011_ann1.png
    - 2018_ann1.png
    - 163004_ann1.png
    - 108004_ann4.png
    - 134049_ann3.png
  max_targets: 400

model:
  target_degree: 5
  hidden_dim: 192
  num_queries: 160
  active_query_topk: 128
  count_min_queries: 16
  count_max_queries: 128
  count_teacher_epochs: 80
  query_source: encoder_uniform_grid
  query_init_seed: 42
  curve_anchor_mode: ref_point_delta
  curve_parameterization: endpoint_offsets
  curve_delta_scale: 0.5
  curve_extent_min: 0.2
  curve_extent_max: 1.8
  interior_delta_ratio: 0.35
  nheads: 8
  num_encoder_layers: 3
  num_decoder_layers: 4
  dim_feedforward: 384
  dropout: 0.0
  backbone_conv_stride: 2
  backbone_use_maxpool: true
  backbone_norm: group
  backbone_gn_groups: 8
  object_bias: -1.0
  no_object_bias: 1.0
  dn_num_groups: 0
  dn_noise_scale: 0.0

loss:
  class_cost: 2.0
  control_cost: 5.0
  sample_cost: 2.0
  box_cost: 1.0
  num_curve_samples: 24
  ce_weight: 1.0
  ctrl_weight: 5.0
  sample_weight: 8.0
  endpoint_weight: 4.0
  bbox_weight: 4.0
  no_object_weight: 0.02
  aux_weight: 0.5
  dn_weight: 0.0
  dn_curve_weight: 0.0
  one_to_many_repeat: 2
  one_to_many_weight: 0.5
  one_to_many_ce_weight: 1.0
  one_to_many_ctrl_weight: 3.0
  one_to_many_sample_weight: 4.0
  one_to_many_endpoint_weight: 2.0
  one_to_many_bbox_weight: 2.0
  topk_positive_per_gt: 2
  topk_positive_weight: 0.5
  count_weight: 1.0
  distinct_weight: 0.2
  distinct_topk: 24
  distinct_spatial_sigma: 0.12

optimizer:
  lr: 0.0002
  weight_decay: 0.0
  lr_step_size: 250
  lr_gamma: 0.5

trainer:
  default_root_dir: outputs/parametric_edge_training/overfit_subset10_uniform_grid_grouped_v2
  max_epochs: 500
  accelerator: cpu
  devices: 1
  overfit_batches: 0.0
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  gradient_clip_val: 0.0

callbacks:
  visualization_every_n_epochs: 50
  visualization_score_threshold: 0.15
  visualization_max_curves: 160
