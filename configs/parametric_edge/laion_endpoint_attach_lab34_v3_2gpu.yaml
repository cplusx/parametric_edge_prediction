data:
  extra_train_datasets:
  - dataset_type: laion_synthetic
    data_root: /data/jiaxin/laion/edge_detection
    image_root: /data/jiaxin/laion/edge_detection
    bezier_root: /data/jiaxin/laion/edge_detection/laion_edge_v3_bezier
    batch_glob: batch*
    entry_cache_path: /data/jiaxin/laion/edge_detection/laion_entry_cache_v3_bezier.txt
    selection_seed: 20260318
    selection_offset: 2048
  val_dataset:
    dataset_type: laion_synthetic
    data_root: /data/jiaxin/laion/edge_detection
    image_root: /data/jiaxin/laion/edge_detection
    bezier_root: /data/jiaxin/laion/edge_detection/laion_edge_v3_bezier
    batch_glob: batch*
    entry_cache_path: /data/jiaxin/laion/edge_detection/laion_entry_cache_v3_bezier.txt
    selection_seed: 20260318
    selection_offset: 0
    max_samples: 1024
  test_dataset:
    dataset_type: laion_synthetic
    data_root: /data/jiaxin/laion/edge_detection
    image_root: /data/jiaxin/laion/edge_detection
    bezier_root: /data/jiaxin/laion/edge_detection/laion_edge_v3_bezier
    batch_glob: batch*
    entry_cache_path: /data/jiaxin/laion/edge_detection/laion_entry_cache_v3_bezier.txt
    selection_seed: 20260318
    selection_offset: 1024
    max_samples: 1024
  endpoint_target_mode: attach
  endpoint_closed_curve_threshold_px: 2.0
model:
  arch: dab_endpoint_detr
loss:
  edge_prob_cost: 0.5
  endpoint_loss_type: attach
  point_attach_weight: 1.0
  point_attach_low_degree_multiplier: 5.0
  point_attach_degree_threshold: 3
  point_attach_num_curve_samples: 8
trainer:
  default_root_dir: /data/jiaxin/parametric_edge_prediction/outputs/laion-endpoint-attach-dab-v3-lab34-edgeprob05
  devices: 2
  strategy: ddp_find_unused_parameters_true
  precision: 32-true
  accumulate_grad_batches: auto
  effective_batch_size: 64
logging:
  csv: true
  wandb:
    enabled: true
    offline: false
    project: laion_parametric_edge_prediction
    name: laion-endpoint-attach-dab-v3-lab34-edgeprob05
    group: laion-endpoint-dab-pretrain
    job_type: train
    tags:
    - laion
    - lab34
    - 2gpu
    - dab
    - endpoint
    - attach
    - v3
    - fp32
    - edgeprob-match
    - edgeprob05
    save_dir: /data/jiaxin/parametric_edge_prediction/outputs/laion-endpoint-attach-dab-v3-lab34-edgeprob05/wandb
