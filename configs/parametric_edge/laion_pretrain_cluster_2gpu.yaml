_inherit_default: false

data:
  include_primary_train_dataset: false
  rgb_input: true
  image_size: 256
  batch_size: 8
  val_batch_size: 8
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  target_degree: 5
  min_curve_length: 3.0
  max_targets: 512
  train_augment: true
  augment:
    resize_scale_range: [1.0, 1.5]
    affine_scale_range: [0.9, 1.1]
    affine_max_rotate_deg: 10.0
    affine_max_translate_ratio: 0.06
    hflip_prob: 0.5
    vflip_prob: 0.0
  limit_samples: null
  overfit_num_samples: null
  sample_names: null
  extra_train_datasets:
    - dataset_type: laion_synthetic
      data_root: /home/user/yc47434/laion/edge_detection
      image_root: /home/user/yc47434/laion/edge_detection/edge_detection
      edge_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2
      cache_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2_bezier_cache_fast
      batch_glob: batch*
      quantize: 4
      selection_seed: 20260318
      selection_offset: 2048
  val_dataset:
    dataset_type: laion_synthetic
    data_root: /home/user/yc47434/laion/edge_detection
    image_root: /home/user/yc47434/laion/edge_detection/edge_detection
    edge_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2
    cache_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2_bezier_cache_fast
    batch_glob: batch*
    quantize: 4
    selection_seed: 20260318
    selection_offset: 0
    max_samples: 1024
  test_dataset:
    dataset_type: laion_synthetic
    data_root: /home/user/yc47434/laion/edge_detection
    image_root: /home/user/yc47434/laion/edge_detection/edge_detection
    edge_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2
    cache_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2_bezier_cache_fast
    batch_glob: batch*
    quantize: 4
    selection_seed: 20260318
    selection_offset: 1024
    max_samples: 1024

model:
  arch: dab_curve_detr
  input_channels: 3
  target_degree: 5
  hidden_dim: 256
  num_queries: 300
  nheads: 8
  num_encoder_layers: 6
  num_decoder_layers: 6
  dim_feedforward: 2048
  dropout: 0.0
  dab_backbone_name: resnet50
  dab_backbone_pretrained: true
  dab_backbone_dilation: false
  backbone_input_norm: imagenet
  dab_keep_query_pos: false
  dab_query_scale_type: cond_elewise
  dab_curve_embed_diff_each_layer: false
  dab_query_modulation_mode: sine_proj
  gradient_checkpointing: true
  curve_coord_min: -0.1
  curve_coord_max: 1.1
  object_bias: -2.0
  no_object_bias: 2.0
  dn_num_groups: 0

loss:
  class_loss_type: focal
  control_cost: 5.0
  sample_cost: 2.0
  curve_match_point_count: 4
  num_curve_samples: 16
  ce_weight: 1.0
  ctrl_weight: 5.0
  sample_weight: 0.0
  endpoint_weight: 2.0
  no_object_weight: 0.2
  dynamic_class_balance: false
  aux_weight: 0.0
  aux_layer_stride: 1
  dn_weight: 0.0
  dn_curve_weight: 0.0
  group_detr_num_groups: 1
  one_to_many_weight: 0.0
  one_to_many_ce_weight: 1.0
  one_to_many_ctrl_weight: 5.0
  one_to_many_sample_weight: 0.0
  one_to_many_endpoint_weight: 2.0
  topk_positive_enabled: false
  topk_positive_per_gt: 2
  topk_positive_layer_k: [2, 2, 2, 2, 2]
  topk_positive_weight: 0.0
  topk_positive_tau: 1.5
  distinct_weight: 0.0
  distinct_topk: 32
  distinct_spatial_sigma: 0.12

optimizer:
  lr: 0.00005
  backbone_lr: 0.000025
  weight_decay: 0.0001
  beta1: 0.9
  beta2: 0.999
  scheduler: multistep
  warmup_epochs: 20
  warmup_start_factor: 0.1
  lr_milestones: [140, 180]
  lr_gamma: 0.1
  min_lr_ratio: 0.01

trainer:
  default_root_dir: /home/user/yc47434/cluster_runs/parametric_edge_prediction/laion-dab-r50-2gpu-q300-eb64-lr5e5-fp32
  max_epochs: 200
  accelerator: gpu
  devices: 2
  strategy: deepspeed_stage_2
  precision: 32-true
  accumulate_grad_batches: 4
  log_every_n_steps: 10
  gradient_clip_val: 0.1
  deterministic: false
  benchmark: true
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  overfit_batches: 0.0
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
  effective_train_batches_per_epoch: 2000
  run_test_after_fit: false

callbacks:
  visualization_every_n_epochs: 1
  visualization_every_n_train_steps: 2000
  visualization_score_threshold: 0.5
  visualization_max_curves: 300

logging:
  csv: true
  wandb:
    enabled: true
    offline: false
    project: laion_parametric_edge_prediction
    name: laion-dab-r50-2gpu-q300-eb64-lr5e5-fp32
    group: laion-dab-pretrain
    job_type: train
    tags:
      - laion
      - cluster
      - 2gpu
      - dab
      - r50
      - q300
      - effective-batch-64
      - lr5e-5
      - fp32
    save_dir: /home/user/yc47434/cluster_runs/parametric_edge_prediction/laion-dab-r50-2gpu-q300-eb64-lr5e5-fp32/wandb
