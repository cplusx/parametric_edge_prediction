data:
  batch_size: 10
  val_batch_size: 10

trainer:
  default_root_dir: outputs/parametric_edge_training/formal_bsds_loss_search_balanced_base_50ep
  max_epochs: 50
  run_test_after_fit: false

loss:
  ce_weight: 7.0
  ctrl_weight: 5.0
  sample_weight: 7.5
  endpoint_weight: 5.5
  bbox_weight: 5.5
  giou_weight: 0.22
  curve_distance_weight: 4.75
  extent_weight: 1.3
  aux_weight: 0.2
  dn_weight: 5.0
  one_to_many_weight: 1.1
  one_to_many_ce_weight: 7.0
  one_to_many_ctrl_weight: 5.0
  one_to_many_sample_weight: 7.5
  one_to_many_endpoint_weight: 5.5
  one_to_many_bbox_weight: 5.5
  one_to_many_giou_weight: 0.22
  one_to_many_curve_distance_weight: 4.75
  one_to_many_extent_weight: 1.3
  topk_positive_weight: 1.1
  distinct_weight: 8.0

logging:
  wandb:
    name: formal-bsds-loss-search-balanced-base-50ep
    group: formal-bsds-loss-balance-search
    job_type: search
    save_dir: outputs/parametric_edge_training/formal_bsds_loss_search_balanced_base_50ep/wandb
    tags:
      - formal
      - bsds
      - loss-search
      - 50ep
      - balanced
      - base
