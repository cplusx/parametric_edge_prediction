_inherit_default: false

data:
  include_primary_train_dataset: false
  rgb_input: true
  image_size: 256
  batch_size: 16
  val_batch_size: 8
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  target_degree: 5
  min_curve_length: 3.0
  max_targets: 300
  endpoint_dedupe_distance_px: 2.0
  train_augment: true
  augment:
    resize_scale_range: [1.0, 1.5]
    affine_scale_range: [0.9, 1.1]
    affine_max_rotate_deg: 10.0
    affine_max_translate_ratio: 0.06
    hflip_prob: 0.5
    vflip_prob: 0.0
  limit_samples: null
  sample_names: null
  extra_train_datasets:
    - dataset_type: laion_synthetic
      data_root: /home/user/yc47434/laion/edge_detection
      image_root: /home/user/yc47434/laion/edge_detection/edge_detection
      edge_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2
      cache_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2_bezier_cache_fast
      batch_glob: batch*
      quantize: 4
      selection_seed: 20260318
      selection_offset: 2048
  val_dataset:
    dataset_type: laion_synthetic
    data_root: /home/user/yc47434/laion/edge_detection
    image_root: /home/user/yc47434/laion/edge_detection/edge_detection
    edge_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2
    cache_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2_bezier_cache_fast
    batch_glob: batch*
    quantize: 4
    selection_seed: 20260318
    selection_offset: 0
    max_samples: 1024
  test_dataset:
    dataset_type: laion_synthetic
    data_root: /home/user/yc47434/laion/edge_detection
    image_root: /home/user/yc47434/laion/edge_detection/edge_detection
    edge_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2
    cache_root: /home/user/yc47434/laion/edge_detection/laion_edge_v2_bezier_cache_fast
    batch_glob: batch*
    quantize: 4
    selection_seed: 20260318
    selection_offset: 1024
    max_samples: 1024

model:
  arch: endpoint_flow_matching
  input_channels: 3
  hidden_dim: 256
  num_points: 300
  nheads: 8
  num_encoder_layers: 6
  num_decoder_layers: 6
  encoder_dim_feedforward: 2048
  decoder_dim_feedforward: 2048
  dropout: 0.0
  dab_backbone_name: resnet50
  dab_backbone_pretrained: true
  dab_backbone_dilation: false
  backbone_input_norm: imagenet
  gradient_checkpointing: true
  cond_drop_rate: 0.1
  num_train_timesteps: 1000

loss:
  velocity_weight: 1.0

optimizer:
  lr: 0.00005
  backbone_lr: 0.000025
  weight_decay: 0.0001
  beta1: 0.9
  beta2: 0.999
  scheduler: multistep
  warmup_epochs: 10
  warmup_start_factor: 0.1
  lr_milestones: [140, 180]
  lr_gamma: 0.1
  min_lr_ratio: 0.01

trainer:
  default_root_dir: /home/user/yc47434/cluster_runs/parametric_edge_prediction/laion-endpoint-uniformflow-r50-{devices}gpu-p300-eb256-lr5e5-fp32
  max_epochs: 200
  accelerator: gpu
  devices: auto
  strategy: deepspeed_stage_2
  precision: 32-true
  accumulate_grad_batches: auto
  effective_batch_size: 256
  log_every_n_steps: 10
  gradient_clip_val: 0.1
  deterministic: false
  benchmark: true
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
  effective_train_batches_per_epoch: 2000
  run_test_after_fit: false

callbacks:
  visualization_every_n_epochs: 1
  visualization_max_points: 300
  visualization_inference_steps: 20
  visualization_guidance_scales: [1.0, 3.0, 5.0, 7.0]

logging:
  csv: true
  wandb:
    enabled: true
    offline: false
    project: laion_parametric_edge_prediction
    name: laion-endpoint-uniformflow-r50-{devices}gpu-p300-eb256-lr5e5-fp32
    group: laion-endpoint-uniformflow
    job_type: train
    tags:
      - laion
      - cluster
      - "{devices}gpu"
      - endpoint
      - uniform-flow-matching
      - diffusers
      - r50
      - p300
      - effective-batch-256
      - lr5e-5
      - fp32
    save_dir: /home/user/yc47434/cluster_runs/parametric_edge_prediction/laion-endpoint-uniformflow-r50-{devices}gpu-p300-eb256-lr5e5-fp32/wandb
