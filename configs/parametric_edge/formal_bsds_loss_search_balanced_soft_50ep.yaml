data:
  batch_size: 10
  val_batch_size: 10

trainer:
  default_root_dir: outputs/parametric_edge_training/formal_bsds_loss_search_balanced_soft_50ep
  max_epochs: 50
  run_test_after_fit: false

loss:
  ce_weight: 5.5
  ctrl_weight: 4.5
  sample_weight: 6.0
  endpoint_weight: 4.5
  bbox_weight: 4.5
  giou_weight: 0.3
  curve_distance_weight: 4.0
  extent_weight: 1.0
  aux_weight: 0.2
  dn_weight: 3.0
  one_to_many_weight: 1.0
  one_to_many_ce_weight: 5.5
  one_to_many_ctrl_weight: 4.5
  one_to_many_sample_weight: 6.0
  one_to_many_endpoint_weight: 4.5
  one_to_many_bbox_weight: 4.5
  one_to_many_giou_weight: 0.3
  one_to_many_curve_distance_weight: 4.0
  one_to_many_extent_weight: 1.0
  topk_positive_weight: 1.0
  distinct_weight: 4.0

logging:
  wandb:
    name: formal-bsds-loss-search-balanced-soft-50ep
    group: formal-bsds-loss-balance-search
    job_type: search
    save_dir: outputs/parametric_edge_training/formal_bsds_loss_search_balanced_soft_50ep/wandb
    tags:
      - formal
      - bsds
      - loss-search
      - 50ep
      - balanced
      - soft
