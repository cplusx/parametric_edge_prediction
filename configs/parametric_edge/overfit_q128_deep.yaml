data:
  batch_size: 1
  val_batch_size: 1
  image_size: 192
  limit_samples: null
  overfit_num_samples: 1
  sample_names:
    - 209021_ann1.png
  max_targets: 24

model:
  target_degree: 5
  hidden_dim: 256
  num_queries: 128
  nheads: 8
  num_encoder_layers: 4
  num_decoder_layers: 6
  dim_feedforward: 768
  dropout: 0.0
  backbone_norm: group
  backbone_gn_groups: 8
  object_bias: -1.0
  no_object_bias: 1.0
  pretrained_checkpoint: outputs/parametric_edge_training/overfit_memorize_no_dn/checkpoints/best-073-0.0000.ckpt
  dn_num_groups: 0
  dn_noise_scale: 0.0

loss:
  class_cost: 2.0
  control_cost: 5.0
  sample_cost: 2.0
  box_cost: 1.0
  num_curve_samples: 24
  ce_weight: 1.0
  ctrl_weight: 5.0
  sample_weight: 8.0
  endpoint_weight: 4.0
  bbox_weight: 4.0
  no_object_weight: 0.02
  aux_weight: 0.0
  dn_weight: 0.0
  dn_curve_weight: 0.0
  curvature_sample_alpha: 0.5
  curvature_endpoint_alpha: 0.75

optimizer:
  lr: 0.0002
  weight_decay: 0.0
  lr_step_size: 400
  lr_gamma: 0.5

trainer:
  default_root_dir: outputs/parametric_edge_training/overfit_no_dn_q128_deep
  max_epochs: 120
  accelerator: cpu
  devices: 1
  overfit_batches: 1
  limit_train_batches: 1
  limit_val_batches: 1
  gradient_clip_val: 0.0

callbacks:
  visualization_every_n_epochs: 1
  visualization_score_threshold: 0.15
  visualization_max_curves: 48
