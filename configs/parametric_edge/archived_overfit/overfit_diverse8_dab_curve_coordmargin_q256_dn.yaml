_inherit_default: false

data:
  include_primary_train_dataset: true
  rgb_input: true
  image_size: 256
  cache_dir: edge_data/HED-BSDS/cache/graph_polyline_v1_segments_xy_v5_anchor_consistent
  target_version: v5_anchor_consistent
  target_degree: 5
  min_curve_length: 3.0
  train_edge_globs:
    - edge_data/HED-BSDS/gt_rgb/test/43033_ann2.png
    - edge_data/HED-BSDS/gt_rgb/test/100007_ann1.png
    - edge_data/HED-BSDS/gt_rgb/test/183066_ann2.png
    - edge_data/HED-BSDS/gt_rgb/test/33044_ann1.png
    - edge_data/HED-BSDS/gt_rgb/test/87015_ann5.png
    - edge_data/HED-BSDS/gt_rgb/test/2018_ann2.png
    - edge_data/HED-BSDS/gt_rgb/test/36046_ann6.png
    - edge_data/HED-BSDS/gt_rgb/test/196062_ann3.png
  val_edge_globs:
    - edge_data/HED-BSDS/gt_rgb/test/43033_ann2.png
    - edge_data/HED-BSDS/gt_rgb/test/100007_ann1.png
    - edge_data/HED-BSDS/gt_rgb/test/183066_ann2.png
    - edge_data/HED-BSDS/gt_rgb/test/33044_ann1.png
    - edge_data/HED-BSDS/gt_rgb/test/87015_ann5.png
    - edge_data/HED-BSDS/gt_rgb/test/2018_ann2.png
    - edge_data/HED-BSDS/gt_rgb/test/36046_ann6.png
    - edge_data/HED-BSDS/gt_rgb/test/196062_ann3.png
  test_edge_globs:
    - edge_data/HED-BSDS/gt_rgb/test/43033_ann2.png
    - edge_data/HED-BSDS/gt_rgb/test/100007_ann1.png
    - edge_data/HED-BSDS/gt_rgb/test/183066_ann2.png
    - edge_data/HED-BSDS/gt_rgb/test/33044_ann1.png
    - edge_data/HED-BSDS/gt_rgb/test/87015_ann5.png
    - edge_data/HED-BSDS/gt_rgb/test/2018_ann2.png
    - edge_data/HED-BSDS/gt_rgb/test/36046_ann6.png
    - edge_data/HED-BSDS/gt_rgb/test/196062_ann3.png
  train_input_roots:
    - edge_data/HED-BSDS/images/test
  val_input_roots:
    - edge_data/HED-BSDS/images/test
  test_input_roots:
    - edge_data/HED-BSDS/images/test
  overfit_num_samples: null
  sample_names: null
  batch_size: 4
  val_batch_size: 4
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  max_targets: 128
  train_augment: false
  augment:
    resize_scale_range: [1.0, 1.0]
    affine_scale_range: [1.0, 1.0]
    affine_max_rotate_deg: 0.0
    affine_max_translate_ratio: 0.0
    hflip_prob: 0.0
    vflip_prob: 0.0

model:
  arch: dab_curve_detr
  hidden_dim: 256
  num_queries: 256
  nheads: 8
  num_encoder_layers: 2
  num_decoder_layers: 3
  dim_feedforward: 1024
  dropout: 0.0
  dab_backbone_name: resnet18
  dab_backbone_pretrained: false
  dab_backbone_dilation: false
  dab_keep_query_pos: false
  dab_query_scale_type: cond_elewise
  dab_curve_embed_diff_each_layer: false
  dab_query_modulation_mode: sine_proj
  curve_coord_min: -0.1
  curve_coord_max: 1.1
  dn_num_groups: 4
  dn_noise_scale: 0.04
  dn_use_label_embed: false

loss:
  class_loss_type: ce
  control_cost: 5.0
  sample_cost: 2.0
  curve_match_point_count: 4
  num_curve_samples: 16
  ce_weight: 1.0
  ctrl_weight: 5.0
  sample_weight: 0.0
  endpoint_weight: 2.0
  no_object_weight: 0.2
  dynamic_class_balance: false
  aux_weight: 0.0
  aux_layer_stride: 1
  dn_weight: 1.0
  dn_curve_weight: 5.0
  group_detr_num_groups: 1
  one_to_many_weight: 0.0
  topk_positive_enabled: false
  topk_positive_weight: 0.0
  distinct_weight: 0.0

optimizer:
  lr: 0.0001
  backbone_lr: 0.0001
  weight_decay: 0.0
  warmup_epochs: 0
  lr_milestones: [420, 540]
  lr_gamma: 0.5

trainer:
  seed: 20260325
  default_root_dir: outputs/parametric_edge_training/overfit_diverse8_dab_curve_coordmargin_q256_dn
  max_epochs: 600
  accelerator: cpu
  devices: 1
  strategy: auto
  precision: 32-true
  deterministic: true
  benchmark: false
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  overfit_batches: 0.0
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
  run_test_after_fit: false
  log_every_n_steps: 1

callbacks:
  visualization_every_n_epochs: 50
  visualization_score_threshold: 0.5
  visualization_max_curves: 256

logging:
  csv: true
  wandb:
    enabled: false
