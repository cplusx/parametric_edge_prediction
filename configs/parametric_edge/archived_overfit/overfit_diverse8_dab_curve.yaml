  train_input_roots:
    - edge_data/HED-BSDS/images/test
  val_input_roots:
    - edge_data/HED-BSDS/images/test
  test_input_roots:
    - edge_data/HED-BSDS/images/test
  overfit_num_samples: null
  sample_names: null
  batch_size: 4
  val_batch_size: 4
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  max_targets: 128
  train_augment: false
  augment:
    resize_scale_range: [1.0, 1.0]
    affine_scale_range: [1.0, 1.0]
    affine_max_rotate_deg: 0.0
    affine_max_translate_ratio: 0.0
    hflip_prob: 0.0
    vflip_prob: 0.0

model:
  arch: dab_curve_detr
  hidden_dim: 256
  num_queries: 96
  nheads: 8
  num_encoder_layers: 2
  num_decoder_layers: 3
  dim_feedforward: 1024
  dropout: 0.0
  dab_backbone_name: resnet18
  dab_backbone_pretrained: false
  dab_backbone_dilation: false
  dab_keep_query_pos: false
  dab_query_scale_type: cond_elewise
  dab_curve_embed_diff_each_layer: false
  dab_query_modulation_mode: sine_proj
  dn_num_groups: 0

loss:
  aux_weight: 0.0
  dn_weight: 0.0
  dn_curve_weight: 0.0
  group_detr_num_groups: 1
  one_to_many_weight: 0.0
  topk_positive_enabled: false
  topk_positive_weight: 0.0
  distinct_weight: 0.0

optimizer:
  lr: 0.0001
  backbone_lr: 0.0001
  weight_decay: 0.0
  warmup_epochs: 0
  lr_milestones: [420, 540]
  lr_gamma: 0.5

trainer:
  seed: 20260324
  default_root_dir: outputs/parametric_edge_training/overfit_diverse8_dab_curve
  max_epochs: 600
  accelerator: cpu
  devices: 1
  strategy: auto
  precision: 32-true
  deterministic: true
  benchmark: false
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  overfit_batches: 0.0
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
  run_test_after_fit: false
  log_every_n_steps: 1

callbacks:
  visualization_every_n_epochs: 50
  visualization_score_threshold: 0.5
  visualization_max_curves: 96

logging:
  csv: true
  wandb:
    enabled: false
