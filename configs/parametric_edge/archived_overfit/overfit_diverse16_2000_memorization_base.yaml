data:
  edge_glob: edge_data/HED-BSDS/gt_rgb/test/*.png
  input_root: edge_data/HED-BSDS/images/test
  rgb_input: true
  image_size: 256
  batch_size: 2
  val_batch_size: 2
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  cache_dir: edge_data/HED-BSDS/cache/graph_polyline_v1_segments_xy_v5_anchor_consistent
  target_version: v5_anchor_consistent
  target_degree: 5
  min_curve_length: 3.0
  max_targets: 400
  train_augment: false
  augment:
    resize_scale_range: [1.0, 1.0]
    affine_scale_range: [1.0, 1.0]
    affine_max_rotate_deg: 0.0
    affine_max_translate_ratio: 0.0
    hflip_prob: 0.0
    vflip_prob: 0.0
  overfit_num_samples: 16
  sample_names:
    - 43033_ann2.png
    - 100007_ann1.png
    - 183066_ann2.png
    - 33044_ann1.png
    - 87015_ann5.png
    - 2018_ann2.png
    - 36046_ann6.png
    - 196062_ann3.png
    - 220003_ann2.png
    - 159002_ann6.png
    - 206062_ann5.png
    - 51084_ann4.png
    - 147077_ann4.png
    - 368037_ann3.png
    - 156054_ann4.png
    - 134049_ann3.png
  max_targets: 512
  val_ratio: 0.1
  test_ratio: 0.0
  split_seed: 42
  limit_samples: null

model:
  input_channels: 3
  target_degree: 5
  hidden_dim: 256
  num_queries: 512
  nheads: 8
  num_encoder_layers: 2
  num_decoder_layers: 6
  dim_feedforward: 1024
  dropout: 0.0
  num_feature_levels: 4
  num_sampling_points: 4
  deformable_offset_scale: 2.0
  backbone_name: vit_small_patch14_dinov2
  backbone_pretrained: true
  backbone_out_indices:
    - 2
    - 5
    - 8
    - 11
  backbone_input_norm: imagenet
  query_source: two_stage
  curve_parameterization: endpoint_offsets
  curve_delta_scale: 0.35
  interior_delta_ratio: 0.35
  object_bias: -1.0
  no_object_bias: 1.0
  dn_num_groups: 0
  dn_noise_scale: 0.0

loss:
  class_loss_type: focal
  focal_alpha: 0.25
  focal_gamma: 2.0
  control_cost: 1.5
  sample_cost: 2.0
  box_cost: 0.5
  giou_cost: 1.0
  curve_distance_cost: 6.0
  num_curve_samples: 24
  ce_weight: 1.0
  ctrl_weight: 5.0
  sample_weight: 4.0
  endpoint_weight: 2.0
  no_object_weight: 0.02
  aux_weight: 0.0
  dn_weight: 0.0
  dn_curve_weight: 0.0
  group_detr_num_groups: 4
  one_to_many_weight: 0.0
  one_to_many_ce_weight: 1.0
  one_to_many_ctrl_weight: 3.0
  one_to_many_sample_weight: 3.0
  one_to_many_endpoint_weight: 2.0
  topk_positive_enabled: false
  topk_positive_per_gt: 2
  topk_positive_layer_k: [2, 2, 2, 2, 2]
  topk_positive_weight: 0.0
  topk_positive_tau: 1.5
  distinct_weight: 0.0
  distinct_topk: 32
  distinct_spatial_sigma: 0.12

optimizer:
  lr: 0.00005
  weight_decay: 0.0
  lr_step_size: 1200
  lr_gamma: 0.5

trainer:
  default_root_dir: outputs/parametric_edge_training/overfit_diverse16_2000_memorization_base
  max_epochs: 2000
  accelerator: gpu
  devices: 1
  log_every_n_steps: 1
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  overfit_batches: 0.0
  gradient_clip_val: 0.05
  deterministic: false

callbacks:
  visualization_every_n_epochs: 50
  visualization_score_threshold: 0.1
  visualization_max_curves: 192

logging:
  csv: true
  wandb:
    enabled: true
    offline: false
    project: parametric-edge-prediction
    name: overfit-diverse16-2000-memorization-base
    group: overfit-diverse16-addback
    job_type: train
    tags:
      - overfit
      - gpu
      - diverse16
      - 2000epoch
      - addback
      - memorization-base
    save_dir: outputs/parametric_edge_training/overfit_diverse16_2000_memorization_base/wandb
