<svg xmlns="http://www.w3.org/2000/svg" width="1880" height="1240" viewBox="0 0 1880 1240" role="img" aria-labelledby="title desc">
  <title id="title">Parametric Edge Loss Computation Flow</title>
  <desc id="desc">Structured diagram showing, row by row, which decoder outputs feed which matching stage and which loss terms are applied.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .title { font: 700 38px 'DejaVu Sans', sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 18px 'DejaVu Sans', sans-serif; fill: #cbd5e1; }
      .header { font: 700 18px 'DejaVu Sans', sans-serif; fill: #e5eef9; }
      .celltitle { font: 700 16px 'DejaVu Sans', sans-serif; fill: #f8fafc; }
      .text { font: 400 15px 'DejaVu Sans', sans-serif; fill: #e2e8f0; }
      .small { font: 400 14px 'DejaVu Sans', sans-serif; fill: #cbd5e1; }
      .tiny { font: 400 13px 'DejaVu Sans', sans-serif; fill: #cbd5e1; }
      .panel { fill: rgba(255,255,255,0.03); stroke: rgba(148,163,184,0.24); stroke-width: 2; }
      .head { fill: #1e293b; stroke: #94a3b8; stroke-width: 2; }
      .decoder { fill: #0f766e; stroke: #99f6e4; stroke-width: 2; }
      .main { fill: #2563eb; stroke: #bfdbfe; stroke-width: 2; }
      .grouped { fill: #7c3aed; stroke: #ddd6fe; stroke-width: 2; }
      .dn { fill: #b45309; stroke: #fed7aa; stroke-width: 2; }
      .match { fill: #334155; stroke: #cbd5e1; stroke-width: 2; }
      .loss { fill: #475569; stroke: #cbd5e1; stroke-width: 2; }
      .sum { fill: #dc2626; stroke: #fecaca; stroke-width: 2; }
      .line { stroke: rgba(148,163,184,0.22); stroke-width: 2; }
    </style>
  </defs>

  <rect width="1880" height="1240" fill="url(#bg)"/>
  <text x="60" y="56" class="title">Loss Computation Flow</text>
  <text x="60" y="88" class="subtitle">按“输出张量 → matching 方式 → loss 项”逐行展开。现在这张图只回答一件事：每一路输出到底算了什么 loss。</text>

  <rect x="40" y="120" width="1800" height="80" rx="18" class="panel"/>
  <rect x="60" y="140" width="320" height="40" rx="10" class="head"/>
  <rect x="410" y="140" width="360" height="40" rx="10" class="head"/>
  <rect x="800" y="140" width="360" height="40" rx="10" class="head"/>
  <rect x="1190" y="140" width="460" height="40" rx="10" class="head"/>
  <rect x="1680" y="140" width="140" height="40" rx="10" class="head"/>
  <text x="92" y="166" class="header">输出张量 / 来源</text>
  <text x="452" y="166" class="header">如何做 matching / 选正样本</text>
  <text x="847" y="166" class="header">真正计算的 loss</text>
  <text x="1228" y="166" class="header">备注</text>
  <text x="1708" y="166" class="header">训练/测试</text>

  <!-- Row 1 -->
  <rect x="40" y="225" width="1800" height="175" rx="20" class="panel"/>
  <rect x="60" y="245" width="320" height="135" rx="14" class="decoder"/>
  <text x="88" y="274" class="celltitle">`aux_outputs[i].pred_logits / pred_curves`</text>
  <text x="88" y="302" class="text">来源：被 `aux_layer_stride` 选中的中间 decoder 层</text>
  <text x="88" y="326" class="text">当前默认：隔一层保留一次</text>
  <text x="88" y="350" class="text">它们不是 grouped auxiliary branch</text>

  <rect x="410" y="245" width="360" height="135" rx="14" class="match"/>
  <text x="438" y="274" class="celltitle">独立 Hungarian matching</text>
  <text x="438" y="302" class="text">每个 aux 层都单独对 GT 做一次 one-to-one matching</text>
  <text x="438" y="326" class="text">不使用 grouped one-to-many</text>
  <text x="438" y="350" class="text">不使用 top-k add-on</text>

  <rect x="800" y="245" width="360" height="135" rx="14" class="loss"/>
  <text x="828" y="274" class="celltitle">`aux matched loss`</text>
  <text x="828" y="302" class="text">`MatchedCurveLoss`:</text>
  <text x="828" y="326" class="text">`ce + ctrl + sample + endpoint + giou + curve_distance`</text>
  <text x="828" y="350" class="text">最终乘外层 `aux_weight`</text>

  <rect x="1190" y="245" width="460" height="135" rx="14" class="loss"/>
  <text x="1218" y="274" class="celltitle">本质：decoder deep supervision</text>
  <text x="1218" y="302" class="text">它只是“层间辅助监督”，不是 one-to-many，也不是 DN。</text>
  <text x="1218" y="326" class="text">所以这一路只回答：中间层有没有提前学会主任务。</text>

  <rect x="1680" y="245" width="140" height="135" rx="14" class="loss"/>
  <text x="1714" y="288" class="celltitle">训练</text>
  <text x="1704" y="320" class="text">仅训练时</text>
  <text x="1699" y="344" class="text">用于 deep sup</text>

  <!-- Row 2 -->
  <rect x="40" y="425" width="1800" height="175" rx="20" class="panel"/>
  <rect x="60" y="445" width="320" height="135" rx="14" class="main"/>
  <text x="88" y="474" class="celltitle">`pred_logits / pred_curves`</text>
  <text x="88" y="502" class="text">来源：final decoder layer</text>
  <text x="88" y="526" class="text">只取 `group 0`</text>
  <text x="88" y="550" class="text">这就是推理时真正保留的主输出</text>

  <rect x="410" y="445" width="360" height="135" rx="14" class="match"/>
  <text x="438" y="474" class="celltitle">主 Hungarian matching</text>
  <text x="438" y="502" class="text">对 `group 0` 做 one-to-one matching</text>
  <text x="438" y="526" class="text">DN 不参与</text>
  <text x="438" y="550" class="text">其它 groups 也不参与</text>

  <rect x="800" y="445" width="360" height="135" rx="14" class="loss"/>
  <text x="828" y="474" class="celltitle">`main matched loss`</text>
  <text x="828" y="502" class="text">`ce + ctrl + sample + endpoint + giou + curve_distance`</text>
  <text x="828" y="526" class="text">这是主分支，直接进入总 loss</text>
  <text x="828" y="550" class="text">没有额外外层缩放</text>

  <rect x="1190" y="445" width="460" height="135" rx="14" class="loss"/>
  <text x="1218" y="474" class="celltitle">本质：最终 one-to-one 主任务</text>
  <text x="1218" y="502" class="text">训练和测试共同关注的就是这一路。</text>
  <text x="1218" y="526" class="text">如果你问“最终模型到底靠哪一路出结果”，答案就是这一行。</text>

  <rect x="1680" y="445" width="140" height="135" rx="14" class="loss"/>
  <text x="1714" y="488" class="celltitle">训练 + 测试</text>
  <text x="1700" y="520" class="text">训练算 loss</text>
  <text x="1703" y="544" class="text">测试保留输出</text>

  <!-- Row 3 -->
  <rect x="40" y="625" width="1800" height="215" rx="20" class="panel"/>
  <rect x="60" y="645" width="320" height="175" rx="14" class="grouped"/>
  <text x="88" y="674" class="celltitle">`group_pred_logits / group_pred_curves`</text>
  <text x="88" y="702" class="text">来源：final decoder layer</text>
  <text x="88" y="726" class="text">包含所有 active groups</text>
  <text x="88" y="750" class="text">其中：</text>
  <text x="88" y="774" class="text">- `group 0` 是主组</text>
  <text x="88" y="798" class="text">- `group 1..` 是辅助组</text>

  <rect x="410" y="645" width="360" height="175" rx="14" class="match"/>
  <text x="438" y="674" class="celltitle">辅助组各自独立 Hungarian</text>
  <text x="438" y="702" class="text">只对 `group 1..` 做 one-to-one matching</text>
  <text x="438" y="726" class="text">每个辅助组各算一次</text>
  <text x="438" y="750" class="text">然后对各组结果求平均</text>
  <text x="438" y="774" class="text">如果开了 top-k，再在辅助组内部额外选更多 positives</text>

  <rect x="800" y="645" width="360" height="175" rx="14" class="loss"/>
  <text x="828" y="674" class="celltitle">`one-to-many loss`</text>
  <text x="828" y="702" class="text">基础项：</text>
  <text x="828" y="726" class="text">`loss_om_ce + ctrl + sample + endpoint + giou + curve_distance`</text>
  <text x="828" y="750" class="text">然后可选再加：</text>
  <text x="828" y="774" class="text">`top-k add-on` → `loss_om_topk`</text>
  <text x="828" y="798" class="text">最后整体乘 `one_to_many_weight`</text>

  <rect x="1190" y="645" width="460" height="175" rx="14" class="loss"/>
  <text x="1218" y="674" class="celltitle">这一路是你刚才最关心的地方</text>
  <text x="1218" y="702" class="text">- `top-k` 现在已经不是独立 aux loss</text>
  <text x="1218" y="726" class="text">- 它只是 final grouped branch 里的附加正样本策略</text>
  <text x="1218" y="750" class="text">- 辅助组分类监督更弱：默认 `one_to_many_ce_weight &lt; ce_weight`</text>
  <text x="1218" y="774" class="text">- 当前 top-k 只作用在辅助组，不动主组</text>

  <rect x="1680" y="645" width="140" height="175" rx="14" class="loss"/>
  <text x="1714" y="688" class="celltitle">训练</text>
  <text x="1703" y="720" class="text">仅训练时</text>
  <text x="1695" y="744" class="text">推理不单独保留</text>
  <text x="1701" y="768" class="text">辅助 groups</text>

  <!-- Row 4 -->
  <rect x="40" y="865" width="1800" height="155" rx="20" class="panel"/>
  <rect x="60" y="885" width="320" height="115" rx="14" class="grouped"/>
  <text x="88" y="914" class="celltitle">`group_pred_*` again</text>
  <text x="88" y="942" class="text">final grouped outputs</text>
  <text x="88" y="966" class="text">query hidden + refs + logits + curves</text>

  <rect x="410" y="885" width="360" height="115" rx="14" class="match"/>
  <text x="438" y="914" class="celltitle">不是 Hungarian</text>
  <text x="438" y="942" class="text">先挑高分 query，再看同组内是否像同一 GT 重复</text>
  <text x="438" y="966" class="text">这是正则项，不是主匹配</text>

  <rect x="800" y="885" width="360" height="115" rx="14" class="loss"/>
  <text x="828" y="914" class="celltitle">`distinct loss`</text>
  <text x="828" y="942" class="text">惩罚同组内高分、近邻、像同一 GT 的重复 query</text>
  <text x="828" y="966" class="text">整体乘 `distinct_weight`</text>

  <rect x="1190" y="885" width="460" height="115" rx="14" class="loss"/>
  <text x="1218" y="914" class="celltitle">本质：重复预测抑制</text>
  <text x="1218" y="942" class="text">它不负责匹配 GT 本身，而是让 grouped branch 少出现一堆相似 query。</text>

  <rect x="1680" y="885" width="140" height="115" rx="14" class="loss"/>
  <text x="1714" y="928" class="celltitle">训练</text>
  <text x="1703" y="960" class="text">仅训练时</text>

  <!-- Row 5 -->
  <rect x="40" y="1045" width="1800" height="155" rx="20" class="panel"/>
  <rect x="60" y="1065" width="320" height="115" rx="14" class="dn"/>
  <text x="88" y="1094" class="celltitle">`dn_pred_logits / dn_pred_curves`</text>
  <text x="88" y="1122" class="text">来源：decoder 输出前段 DN slice</text>
  <text x="88" y="1146" class="text">由 noisy GT 构造出来的 DN queries</text>

  <rect x="410" y="1065" width="360" height="115" rx="14" class="match"/>
  <text x="438" y="1094" class="celltitle">不做 Hungarian</text>
  <text x="438" y="1122" class="text">直接和 `dn_meta` 里的 clean targets 对齐监督</text>
  <text x="438" y="1146" class="text">是 supervised denoising</text>

  <rect x="800" y="1065" width="360" height="115" rx="14" class="loss"/>
  <text x="828" y="1094" class="celltitle">`DN loss`</text>
  <text x="828" y="1122" class="text">`loss_dn = dn_weight * (loss_dn_ce + dn_curve_weight * loss_dn_curve)`</text>
  <text x="828" y="1146" class="text">完全独立于主 matching</text>

  <rect x="1190" y="1065" width="460" height="115" rx="14" class="loss"/>
  <text x="1218" y="1094" class="celltitle">本质：让 query 更快贴近 GT 邻域</text>
  <text x="1218" y="1122" class="text">DN 不参与主 Hungarian，所以不会和主 queries 抢配对。</text>

  <rect x="1680" y="1065" width="140" height="115" rx="14" class="loss"/>
  <text x="1714" y="1108" class="celltitle">训练</text>
  <text x="1703" y="1140" class="text">仅训练时</text>

  <!-- Final total -->
  <rect x="1180" y="20" width="640" height="76" rx="18" class="sum"/>
  <text x="1210" y="52" class="celltitle">总 loss</text>
  <text x="1210" y="78" class="text">`loss = main + aux_weight*aux + one_to_many_weight*(om + topk_addon) + distinct_weight*distinct + DN`</text>

</svg>
